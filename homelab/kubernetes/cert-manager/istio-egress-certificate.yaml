---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: istio-egress-ca-issuer
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: istio-egress-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: istio-egress-ca
  secretName: istio-egress-ca-secret
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: istio-egress-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: istio-egress-issuer
spec:
  ca:
    secretName: istio-egress-ca-secret

---
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: istio-egress-ca-bundle
spec:
  sources:
    - secret:
        name: istio-egress-ca-secret
        key: "tls.crt"
    - useDefaultCAs: true
  target:
    configMap:
      key: "trust-bundle.crt"
    additionalFormats:
      pkcs12:
        key: "bundle.p12"
