---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  namespace: victoriastack
  name: kubelet
spec:
  groups:
    - name: kubelet
      params: {}
      rules:
        - annotations: {}
          expr:
            histogram_quantile(0.99,
            sum(rate(kubelet_pleg_relist_duration_seconds_bucket{job="kubelet",metrics_path="/metrics"}[5m]))
            by(cluster,instance,le) * on(cluster,instance) group_left(node)
            max(kubelet_node_name{job="kubelet",metrics_path="/metrics"})
            by(cluster,instance,node))
          labels:
            quantile: "0.99"
          record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
        - annotations: {}
          expr:
            histogram_quantile(0.9,
            sum(rate(kubelet_pleg_relist_duration_seconds_bucket{job="kubelet",metrics_path="/metrics"}[5m]))
            by(cluster,instance,le) * on(cluster,instance) group_left(node)
            max(kubelet_node_name{job="kubelet",metrics_path="/metrics"})
            by(cluster,instance,node))
          labels:
            quantile: "0.9"
          record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
        - annotations: {}
          expr:
            histogram_quantile(0.5,
            sum(rate(kubelet_pleg_relist_duration_seconds_bucket{job="kubelet",metrics_path="/metrics"}[5m]))
            by(cluster,instance,le) * on(cluster,instance) group_left(node)
            max(kubelet_node_name{job="kubelet",metrics_path="/metrics"})
            by(cluster,instance,node))
          labels:
            quantile: "0.5"
          record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
