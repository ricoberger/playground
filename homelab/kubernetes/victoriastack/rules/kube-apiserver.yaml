apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  namespace: victoriastack
  name: kube-apiserver-histogram
spec:
  groups:
    - name: kube-apiserver-histogram
      params: {}
      rules:
        - annotations: {}
          expr:
            histogram_quantile(0.99,
            sum(rate(apiserver_request_sli_duration_seconds_bucket{job="apiserver",verb=~"LIST|GET",subresource!~"proxy|attach|log|exec|portforward"}[5m]))
            by(cluster,le,resource)) > 0
          labels:
            quantile: "0.99"
            verb: read
          record: cluster_quantile:apiserver_request_sli_duration_seconds:histogram_quantile
        - annotations: {}
          expr:
            histogram_quantile(0.99,
            sum(rate(apiserver_request_sli_duration_seconds_bucket{job="apiserver",verb=~"POST|PUT|PATCH|DELETE",subresource!~"proxy|attach|log|exec|portforward"}[5m]))
            by(cluster,le,resource)) > 0
          labels:
            quantile: "0.99"
            verb: write
          record: cluster_quantile:apiserver_request_sli_duration_seconds:histogram_quantile

