apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  namespace: victoriastack
  name: kube-apiserver-slos
spec:
  groups:
    - name: kube-apiserver-slos
      params: {}
      rules:
        - alert: KubeAPIErrorBudgetBurn
          annotations:
            description:
              The API server is burning too much error budget on cluster {{
              $labels.cluster }}.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeapierrorbudgetburn
            summary: The API server is burning too much error budget.
          expr:
            (sum(apiserver_request:burnrate1h) by(cluster) >
            0.14400000000000002) and on(cluster)
            (sum(apiserver_request:burnrate5m) by(cluster) >
            0.14400000000000002)
          for: 2m
